name: Build installers

# Runs on a version tag (v1.2.3) and can also be triggered manually.
#   • Every run builds the per-OS installers and uploads them as artifacts.
#   • The Windows .exe and its NSIS installer are code-signed with Azure
#     Trusted Signing (Azure Artifact Signing) using the AZURE_* repo secrets.
#   • On a tag, a final `release` job fans in — it waits for all three builds,
#     downloads their artifacts, and publishes them as ONE GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pdfium-asset: pdfium-win-x64
            pdfium-libfile: bin/pdfium.dll
            pkg-formats: --formats nsis
          - os: ubuntu-latest
            pdfium-asset: pdfium-linux-x64
            pdfium-libfile: lib/libpdfium.so
            pkg-formats: --formats deb
          - os: macos-latest
            pdfium-asset: pdfium-mac-arm64
            pdfium-libfile: lib/libpdfium.dylib
            pkg-formats: --formats app --formats dmg
    # Azure Trusted Signing auth — consumed only by the Windows sign steps.
    env:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Restore on all OSes; skip the cache *save* on Windows, whose post-job
      # tar intermittently fails on a locked file and would fail the whole job
      # (blocking the release). Linux/macOS still persist their cache.
      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ runner.os != 'Windows' }}

      # Slint's default (winit + femtovg) backend needs these to build on Linux.
      - name: Install Slint build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfontconfig-dev libxcb1-dev libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev libgl1-mesa-dev

      # The engine DLL/.so/.dylib isn't built from source — fetch the prebuilt
      # one for this platform and stage it where it gets bundled (pdfium-lib/)
      # and where local runs would find it (repo root).
      - name: Fetch PDFium (${{ matrix.pdfium-asset }})
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pdfium-dl crates/app/pdfium-lib
          curl -L --fail -o pdfium-dl/pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/${{ matrix.pdfium-asset }}.tgz"
          tar -xzf pdfium-dl/pdfium.tgz -C pdfium-dl
          cp "pdfium-dl/${{ matrix.pdfium-libfile }}" crates/app/pdfium-lib/
          cp "pdfium-dl/${{ matrix.pdfium-libfile }}" .

      - name: Install cargo-packager
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-packager

      - name: Install artifact-signing-cli (Windows)
        if: runner.os == 'Windows'
        run: cargo install artifact-signing-cli --version 0.11.0

      # Build explicitly (not via before-packaging-command) so the Windows .exe
      # can be signed before cargo-packager bundles it into the installer.
      - name: Build (release)
        run: cargo build --release -p open-pdf-studio3

      - name: Sign app binary — Azure Trusted Signing (Windows)
        if: runner.os == 'Windows'
        run: >
          artifact-signing-cli
          -e "${{ secrets.AZURE_ENDPOINT }}"
          -a "${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}"
          -c "${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}"
          target/release/open-pdf-studio3.exe

      - name: Package installers
        run: cargo packager --release -p open-pdf-studio3 ${{ matrix.pkg-formats }} --verbose

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p artifacts
          find target -maxdepth 4 -type f \
            \( -name '*.msi' -o -name '*-setup.exe' -o -name '*.dmg' \
               -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \) \
            -exec cp {} artifacts/ \; 2>/dev/null || true
          echo "Collected:"; ls -la artifacts || true

      - name: Sign installer — Azure Trusted Signing (Windows)
        if: runner.os == 'Windows'
        run: |
          Get-ChildItem artifacts/*-setup.exe | ForEach-Object {
            Write-Host "Signing $($_.Name)"
            artifact-signing-cli -e "${{ secrets.AZURE_ENDPOINT }}" -a "${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}" -c "${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}" $_.FullName
            if ($LASTEXITCODE -ne 0) { throw "signing failed for $($_.Name)" }
          }

      # Fail loudly if signing was silently skipped — an unsigned installer
      # must never reach the release.
      - name: Verify installer signature (Windows)
        if: runner.os == 'Windows'
        run: |
          Get-ChildItem artifacts/*-setup.exe | ForEach-Object {
            $s = Get-AuthenticodeSignature $_.FullName
            Write-Host "$($_.Name): $($s.Status) — $($s.SignerCertificate.Subject)"
            if ($s.Status -eq 'NotSigned') { throw "$($_.Name) is NOT signed" }
          }

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v7
        with:
          name: installers-${{ matrix.os }}
          path: artifacts/*
          if-no-files-found: warn

  # Fan-in: only after ALL three builds succeed, and only for a version tag.
  # Downloads every build's artifacts and publishes them as one GitHub Release.
  release:
    name: Publish GitHub Release
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: installers-*
          merge-multiple: true

      - name: List collected installers
        run: |
          echo "Publishing:"; ls -la dist || true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
